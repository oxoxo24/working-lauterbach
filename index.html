    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            font-size:16px;
        }

        body{

            font-family:
            -apple-system,
            BlinkMacSystemFont,
            "Helvetica Neue",
            Helvetica,
            Arial,
            sans-serif;

            background:#f8f8f5;
            color:#111;

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

        }

        .container{

            width:100%;
            max-width:900px;

            text-align:center;

            padding:60px 30px;

        }

        h1{

            font-size:4rem;
            font-weight:300;
            letter-spacing:-2px;

            margin-bottom:12px;

        }

        .subtitle{

            color:#666;
            letter-spacing:3px;
            text-transform:uppercase;
            font-size:.8rem;

            margin-bottom:90px;

        }

        h2{

            font-size:2rem;
            font-weight:300;

            margin-bottom:25px;

        }

        p{

            font-size:1.1rem;
            line-height:1.8;

            color:#444;

            max-width:620px;
            margin:0 auto 60px;

        }

        .button{

            display:inline-block;

            width:280px;

            padding:18px;

            margin:12px;

            text-decoration:none;

            color:#111;

            border:1px solid #111;

            transition:.25s;

            letter-spacing:1px;

        }

        .button:hover{

            background:#111;
            color:white;

        }

        footer{

            margin-top:120px;

            color:#999;

            font-size:.85rem;

        }

        @media(max-width:700px){

            h1{

                font-size:2.7rem;

            }

            h2{

                font-size:1.5rem;

            }

        }

    </style>
